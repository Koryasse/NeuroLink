<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroLink - Talk to your classmates</title>
    <link rel="stylesheet" href="../css/style.css"> <!--Le css-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css"> <!--Pour l'icone-->
    <script src="/socket.io/socket.io.js"></script> <!--Le websocket-->
    <script src=""></script>    <!--Pour rendre dynamique-->
</head>
<body>
    <main>
        <section>

        </section>  <!--Faire la partie gauche avec le menu-->

        <section class="right-tab">  <!--La partie droite avec le chat-->
            <div>   <!--Message affichés-->
                <div id="messages-container">
                    <div id="messages">
                        <ul id="messages-content"></ul>
                    </div>
                </div>
            </div>
            <div class="global-send">   <!--Input pour envoyer-->
                <form action="">
                    <input type="text" id="message" autocomplete="off" placeholder="Start typing...">
                    <button id="send"><i class="fas fa-arrow-right"></i></button>
                </form>
            </div>
        </section>
    </main>

    <!--Le script qui gère le chat bidirectionnel-->
    <script>
        const socket = io();
        //const username = "<?php echo $_SESSION['username']; ?>";
        //console.log(username);

        socket.on('connect', () => {
            console.log('Connecté au serveur Socket.io');

            socket.on('message', (msg) => {
                if (msg.startsWith(username)) return;

                console.log('Message reçu :', msg);
                const item = document.createElement('li');
                item.textContent = msg;
                item.className = 'recu';
                messages.appendChild(item);
                ajouter(item);
            });
        });

        let total = document.getElementById('messages-content');
        const messages = document.getElementById('messages');

        function ajouter(item) {
            const apparitionKey = 'apparitionHistory';
            let ajout = JSON.parse(localStorage.getItem(apparitionKey)) || [];

            let type = item.className.includes('envoye') ? '[envoye]' : '[recu]';

            ajout.push(`${type} ${item.textContent}`);
            localStorage.setItem(apparitionKey, JSON.stringify(ajout));
        }

        function chargement() {
            const apparitionKey = 'apparitionHistory';
            let ajout = JSON.parse(localStorage.getItem(apparitionKey)) || [];

            ajout.forEach(text => {
                const li = document.createElement('li');

                if (text.startsWith('[envoye]')) {
                    li.textContent = text.substring(8);
                    li.className = 'envoye';
                } else if (text.startsWith('[recu]')) {
                    li.textContent = text.substring(6);
                    li.className = 'recu';
                } else {
                    li.textContent = text;
                    li.className = 'recu';
                }
                messages.appendChild(li);
            });
        }

        window.onload = chargement;

        document.getElementById('message').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('send').click();
            }
        });

        document.getElementById('send').addEventListener('click', () => {
            e.preventDefault();
            const inputElement = document.getElementById('message');
            const inputValue = inputElement.value;

            inputElement.value = inputValue;
            const messageItem = document.createElement('li');
            messageItem.textContent = `${username} : ${inputElement.value}`;
            messageItem.className = 'envoye';
            messages.appendChild(messageItem);
            socket.emit('message', `${username} : ${inputElement.value}`);
            inputElement.value = '';
            ajouter(messageItem);
        });

    </script>
</body>
</html>
