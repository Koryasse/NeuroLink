<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroLink - Connect with your classmates</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div>
            <p>NeuroLink</p>
        </div>
        <div class="nav-links">
            <div>
                <a href="index.html" id="home-btn">Home</a>
            </div>
            <div>
                <a href="html/about.html" id="about-btn">About</a>
            </div>
            <div>
                <a href="html/rules.html" id="rules-btn">Rules</a>
            </div>
        </div>
        <div>
            <a href="php/connexion.php" class="sign-in">Sign in</a>
        </div>
    </header>
    <main>
        <div>
            <h1>NeuroLink - <br>A direct link between minds</h1>
            <p>Exchange ideas at lightning speed, in a space  <br> where humans and technology become one. Welcome<br> to the era of absolute connection.</p>
        </div>
    </main>
    <footer>
        <div class="footer-txt">
            <div class="footer-txt-first">
                <p>Stay connected and chat with your peers.</p>
                <a href="php/chat.html">Open chat</a>
            </div>
            <div>
                <p>&copy; NeuroLink - 2025</p>
            </div>
        </div>
        <div class="footer-img">
            <img src="img/DNA.png" alt="" width="1200px">
        </div>
        <hr>
        <div class="footer-last">
            <p>NeuroLink</p>
        </div>
    </footer>
    <script>
        function getFileName() {
            const path = window.location.pathname;
            const fileName = path.substring(path.lastIndexOf('/') + 1);
            return fileName;
        }
    
        const currentFile = getFileName();
    
        if (currentFile === 'about.html') {
            document.getElementById('about-btn').className = 'btn-animation';
        } else if (currentFile === 'rules.html') {
            document.getElementById('rules-btn').className = 'btn-animation';
        } else {
            document.getElementById('home-btn').className = 'btn-animation';
        }

        let scrollSpeed = 1;
        let interval = setInterval(() => {
            window.scrollBy(0, scrollSpeed); 
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight) {
                clearInterval(interval); 
            }
        }, 10);

        document.addEventListener('wheel', (e) => {
            if (event.deltaY > 0 || event.deltaY < 0) {
                clearInterval(interval);
            }
        });
    </script>
</body>
</html>
